name: "report_agent"
version: "1.0"

controller:
  llm: "openrouter/gemini-3-flash"
  temperature: 0.3

system_prompt_file: "prompts/system.md"

max_iterations: 30
skill_mode: "dynamic"

tools:
  - name: "send_message"
    type: "builtin"
  - name: "report_writer"
    type: "package"
    module: "tools.report_writer"
    class: "ReportWriterTool"

triggers:
  - type: "channel"
    channel: "execution_done"
    task: "analyze_and_report"

memory:
  provider: "model2vec"

compact:
  threshold_tokens: 250000
  strategy: "summarize"

termination:
  keywords: ["REPORT_COMPLETE", "QUEUED_FOR_REVIEW"]
  max_turns: 35
