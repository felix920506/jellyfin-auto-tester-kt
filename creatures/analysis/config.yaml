name: "analysis_agent"
version: "1.0"

controller:
  llm: "openrouter/gpt-5.4-mini"
  temperature: 0.2

system_prompt_file: "prompts/system.md"

max_iterations: 20
skill_mode: "dynamic"

tools:
  - name: "web_fetch"
    type: "builtin"
  - name: "web_search"
    type: "builtin"
  - name: "github_fetcher"
    type: "package"
    module: "tools.github_fetcher"
    class: "GitHubFetcherTool"
  - name: "github_search"
    type: "package"
    module: "tools.github_search"
    class: "GitHubSearchTool"
  - name: "send_message"
    type: "builtin"

memory:
  provider: "model2vec"

compact:
  threshold_tokens: 250000
  strategy: "summarize"

termination:
  keywords: ["INSUFFICIENT_INFORMATION"]
  max_turns: 25
