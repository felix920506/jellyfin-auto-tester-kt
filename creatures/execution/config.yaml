name: "execution_agent"
version: "1.0"

controller:
  llm: "openrouter/claude-opus-4.7"
  temperature: 0.1

system_prompt_file: "prompts/system.md"

max_iterations: 60
skill_mode: "dynamic"

tools:
  - name: "bash"
    type: "builtin"
  - name: "read"
    type: "builtin"
  - name: "write"
    type: "builtin"
  - name: "docker_manager"
    type: "package"
    module: "tools.docker_manager"
  - name: "jellyfin_api"
    type: "package"
    module: "tools.jellyfin_api"
  - name: "screenshot"
    type: "package"
    module: "tools.screenshot"
  - name: "execution_runner"
    type: "package"
    module: "tools.execution_runner"
  - name: "send_message"
    type: "builtin"

triggers:
  - type: "channel"
    channel: "plan_ready"
    task: "execute_plan"
  - type: "channel"
    channel: "verification_request"
    task: "execute_plan"

output:
  named_outputs:
    execution_done:
      type: "channel"
      channel: "execution_done"

memory:
  provider: "model2vec"

compact:
  threshold_tokens: 250000
  strategy: "summarize"
  pin:
    - "jellyfin_logs"
    - "execution_log"

termination:
  keywords: ["EXECUTION_COMPLETE"]
  max_turns: 70
