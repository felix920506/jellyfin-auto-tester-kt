version: "1.0"

creatures:
  - name: "analysis_agent"
    base_config: "creatures/analysis"
    channels:
      can_send:
        - "plan_ready"

  - name: "execution_agent"
    base_config: "creatures/execution"
    channels:
      listen:
        - "plan_ready"
        - "verification_request"
      can_send:
        - "execution_done"

  - name: "report_agent"
    base_config: "creatures/report"
    channels:
      listen:
        - "execution_done"
      can_send:
        - "verification_request"
        - "final_report"
        - "human_review_queue"

channels:
  plan_ready:
    type: "queue"
  execution_done:
    type: "queue"
  verification_request:
    type: "queue"
  final_report:
    type: "broadcast"
  human_review_queue:
    type: "queue"

root_agent: "analysis_agent"
